# Production-ish compose. Brings up the full pinpoint stack on one host:
#   - postgres + PostGIS
#   - libpostal sidecar
#   - pinpoint server (built from ../../Dockerfile, serves the Vue SPA)
#
# `compose.yaml` (peer file) is the dev-mode subset: just postgres + libpostal,
# and the server runs natively via `pnpm dev`. Use that during day-to-day work
# and reach for this file when you need an integration test that includes the
# real built server image (smoke before cutover, demos, etc.).
#
# Run from the TS workspace root (flowcatalyst-apps/typescript/) so the
# build context resolves correctly:
#   docker compose -f apps/pinpoint/compose.prod.yaml up --build
#
# Bind-mount the platform signing secret + any LLM creds via your shell or a
# .env file beside this one (compose auto-loads it).

services:
  postgres:
    # imresamu/postgis is the multi-arch PostGIS image (linux/amd64 + linux/arm64).
    # Same image the dev compose.yaml uses — keep them aligned so a switch
    # between dev + prod compose doesn't re-pull GBs of layers.
    image: imresamu/postgis:18-3.6
    container_name: pinpoint-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinpoint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pinpoint}
      POSTGRES_DB: pinpoint
    volumes:
      # Postgres 18+ image expects the volume at /var/lib/postgresql/
      # (the parent). It places data inside a major-version-specific
      # subdirectory; mounting at /data trips the image's "data outside
      # the mount" warning and refuses to start clean.
      - pinpoint-prod-pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pinpoint -d pinpoint']
      interval: 5s
      timeout: 3s
      retries: 20

  libpostal:
    image: pelias/libpostal-service:latest
    container_name: pinpoint-prod-libpostal
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4400/parse?address=test']
      interval: 10s
      timeout: 5s
      retries: 30
      # First boot loads ~1.7 GB of libpostal model data — give it room.
      start_period: 60s

  pinpoint:
    container_name: pinpoint-prod-server
    restart: unless-stopped
    build:
      # `pnpm install --frozen-lockfile` needs the whole workspace, so the
      # build context is the monorepo root.
      context: ../..
      dockerfile: apps/pinpoint/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      libpostal:
        condition: service_healthy
    environment:
      PORT: '3000'
      HOST: '0.0.0.0'
      DATABASE_URL: postgres://pinpoint:${POSTGRES_PASSWORD:-pinpoint}@postgres:5432/pinpoint
      PINPOINT_LIBPOSTAL_URL: http://libpostal:4400
      PINPOINT_PUBLIC_BASE_URL: ${PINPOINT_PUBLIC_BASE_URL:-http://localhost:3000}
      FLOWCATALYST_CLIENT_ID: ${FLOWCATALYST_CLIENT_ID:-pinpoint}
      FLOWCATALYST_SIGNING_SECRET: ${FLOWCATALYST_SIGNING_SECRET:-}
      # LLM verifier is opt-in. Leave PINPOINT_LLM_PROVIDER=none for the
      # default Noop verifier; matching pipeline runs without LLM creds.
      #
      # provider=bedrock targets Gemma 4 over the bedrock-mantle
      # OpenAI-compatible endpoint (default model google.gemma-4-26b-a4b). It
      # mints a short-term bearer token from the ambient AWS credentials (the
      # task role in ECS; your `aws` creds locally) — no API key. Set
      # PINPOINT_BEDROCK_REGION to the region that hosts Gemma (eu-central-1 is
      # closest to southern Africa; us-east-1/2, us-west-2 also work). Override
      # the endpoint with PINPOINT_BEDROCK_BASE_URL only if AWS changes the host.
      # provider=ollama keeps the local gemma3 path.
      PINPOINT_LLM_PROVIDER: ${PINPOINT_LLM_PROVIDER:-none}
      PINPOINT_LLM_MODEL: ${PINPOINT_LLM_MODEL:-}
      PINPOINT_OLLAMA_URL: ${PINPOINT_OLLAMA_URL:-}
      AWS_REGION: ${AWS_REGION:-}
      PINPOINT_BEDROCK_REGION: ${PINPOINT_BEDROCK_REGION:-}
      PINPOINT_BEDROCK_BASE_URL: ${PINPOINT_BEDROCK_BASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # OIDC. Empty OIDC_ISSUER_URL leaves /auth/login disabled (503) and
      # all routes that need a principal will 401 unless the dev fallback
      # is on. Production: set the issuer URL + audience + client id (+
      # optional secret if the IdP requires one for the token endpoint).
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-pinpoint}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-${PINPOINT_PUBLIC_BASE_URL:-http://localhost:3000}/auth/callback}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
      # Dev fallback — accepts the `x-user-id` header as the principal.
      # MUST be unset in real production.
      PINPOINT_AUTH_DEV_FALLBACK: ${PINPOINT_AUTH_DEV_FALLBACK:-false}
      PINPOINT_AUTH_POST_LOGIN_REDIRECT: ${PINPOINT_AUTH_POST_LOGIN_REDIRECT:-/}
      # Session store: memory (default, lost on restart, single-instance
      # only), redis, or postgres. Multi-replica deploys MUST use redis
      # or postgres so sessions survive restarts and load-balance across
      # instances. The postgres driver reuses DATABASE_URL — no extra
      # infra. The redis driver requires PINPOINT_SESSION_REDIS_URL.
      PINPOINT_SESSION_DRIVER: ${PINPOINT_SESSION_DRIVER:-memory}
      PINPOINT_SESSION_REDIS_URL: ${PINPOINT_SESSION_REDIS_URL:-}
    ports:
      - '${PINPOINT_HTTP_PORT:-3000}:3000'

volumes:
  pinpoint-prod-pgdata:
