packages:
  - 'apps/*'
  - 'apps/*/*'
  - 'packages/*'

allowBuilds:
  # testcontainers (used by @pinpoint/server integration tests) brings in
  # cpu-features + ssh2 for Docker-over-SSH; protobufjs is also a
  # transitive dep with build scripts. None of them run at app runtime,
  # only at install time to compile native bindings.
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  ssh2: true

# Centralised dependency versions. Reference with `"effect": "catalog:"` etc.
# Bump here once instead of in every package.
catalog:
  typescript: ^6.0.3
  vite-plus: ^0.1.21
  vitest: ^4.1.6
  effect: 4.0.0-beta.70
  '@types/node': ^24.0.0

# Lets you opt different apps onto different versions during migrations.
# Reference with `"effect": "catalog:legacy"`.
catalogs:
  legacy:
    effect: 4.0.0-beta.66

onlyBuiltDependencies:
  - esbuild
  - '@swc/core'
